{% if S_CONSENTMANAGER_ENABLED %}
	{% INCLUDECSS '@phpbb_consentmanager/consentmanager.css' %}
	<script>
	(function (window, document) {
		var payload = {{ CONSENTMANAGER_PAYLOAD|raw }};
		var categoryMap = {};
		var index;

		window.phpbbConsentManagerPayload = payload;

		for (index = 0; index < payload.categories.length; index++)
		{
			categoryMap[payload.categories[index].id] = payload.categories[index];
		}

		function parseCookie(name)
		{
			var parts = document.cookie ? document.cookie.split('; ') : [];
			var i;

			for (i = 0; i < parts.length; i++)
			{
				if (parts[i].indexOf(name + '=') === 0)
				{
					return decodeURIComponent(parts[i].substring(name.length + 1));
				}
			}

			return '';
		}

		function loadState()
		{
			var raw = '';
			var state = null;

			try
			{
				if (window.localStorage)
				{
					raw = window.localStorage.getItem(payload.storageKey) || '';
				}
			}
			catch (error)
			{
				raw = '';
			}

			if (!raw)
			{
				raw = parseCookie(payload.cookieName);
			}

			if (!raw)
			{
				return null;
			}

			try
			{
				state = JSON.parse(raw);
			}
			catch (error)
			{
				return null;
			}

			if (!state || state.version !== payload.version || !state.categories || !state.categories.length)
			{
				return null;
			}

			return state;
		}

		var stub = window.consentManager || {};
		stub._queue = stub._queue || [];
		stub.registerScript = stub.registerScript || function (id, options) {
			stub._queue.push(['registerScript', id, options]);
		};
		stub.onChange = stub.onChange || function (callback) {
			stub._queue.push(['onChange', callback]);
		};
		stub.openSettings = stub.openSettings || function () {
			stub._queue.push(['openSettings']);
		};
		stub.ready = stub.ready || function (callback) {
			stub._queue.push(['ready', callback]);
		};
		stub.hasConsent = stub.hasConsent || function (category) {
			var state = loadState();
			return category === 'necessary' || !!(state && categoryMap[category] && categoryMap[category].enabled && state.categories.indexOf(category) !== -1);
		};
		window.consentManager = stub;
	})(window, document);
	</script>
	{% INCLUDEJS '@phpbb_consentmanager/js/consentmanager.js' %}
{% endif %}
