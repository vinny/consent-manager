name: Tests

on:
    push:
        branches:
            - main
            - develop
    pull_request:
        branches:
            - main
            - develop

jobs:
    call-tests:
        name: Extension tests
        uses: phpbb-extensions/test-framework/.github/workflows/tests.yml@3.3.x
        with:
            EXTNAME: phpbb/consentmanager
            CODECOV: 1
        secrets:
            CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
